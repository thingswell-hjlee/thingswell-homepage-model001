AWSTemplateFormatVersion: '2010-09-09'
Description: SafeGAI Platform - S3 + CloudFront + Route53 Infrastructure

Parameters:
  DomainName:
    Type: String
    Default: safegai.com
    Description: SafeGAI Platform 도메인 (safegai.com)
  
  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID for safegai.com
  
  ACMCertificateArn:
    Type: String
    Description: ACM SSL 인증서 ARN (us-east-1 리전, *.safegai.com 포함)

Resources:
  # S3 Bucket for static website hosting
  SafeGAIPlatformBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: safegai-platform
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - https://safegai.com
              - https://www.safegai.com
              - https://thingswell.co.kr
            AllowedMethods:
              - GET
              - HEAD
            AllowedHeaders:
              - '*'
            MaxAge: 86400

  # Bucket Policy for CloudFront OAC
  SafeGAIPlatformBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SafeGAIPlatformBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SafeGAIPlatformBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${SafeGAICloudFrontDistribution}'

  # CloudFront Origin Access Control
  SafeGAIOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: safegai-platform-oac
        Description: OAC for SafeGAI Platform S3 bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  SafeGAICloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: SafeGAI Platform - Physical AI Smart Safety Platform
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_200
        
        Aliases:
          - !Ref DomainName
          - !Sub 'www.${DomainName}'
        
        ViewerCertificate:
          AcmCertificateArn: !Ref ACMCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SafeGAIPlatformBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt SafeGAIOAC.Id
        
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # SecurityHeadersPolicy
        
        # SPA Routing - 404를 index.html로 리다이렉트
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  # Route53 A Record (safegai.com)
  SafeGAIDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SafeGAICloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront Hosted Zone ID (고정값)

  # Route53 A Record (www.safegai.com)
  SafeGAIWWWDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub 'www.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt SafeGAICloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  BucketName:
    Description: S3 Bucket Name
    Value: !Ref SafeGAIPlatformBucket
  
  CloudFrontDomainName:
    Description: CloudFront Distribution Domain Name
    Value: !GetAtt SafeGAICloudFrontDistribution.DomainName
  
  CloudFrontDistributionId:
    Description: CloudFront Distribution ID (배포 스크립트에 입력)
    Value: !Ref SafeGAICloudFrontDistribution
  
  WebsiteURL:
    Description: SafeGAI Platform URL
    Value: !Sub 'https://${DomainName}'
